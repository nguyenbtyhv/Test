version: '3.8'

services:
  web:
    build: .
    container_name: mangahub_web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/log/apache2
    environment:
      - DB_HOST=db
      - DB_NAME=manga_website
      - DB_USER=manga_user
      - DB_PASS=manga_password
    depends_on:
      - db
    networks:
      - mangahub_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mangahub_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: manga_website
      MYSQL_USER: manga_user
      MYSQL_PASSWORD: manga_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - mangahub_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mangahub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - mangahub_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mangahub_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./assets:/var/www/html/assets:ro
      - ./uploads:/var/www/html/uploads:ro
    depends_on:
      - web
    networks:
      - mangahub_network
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: mangahub_adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - mangahub_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  mangahub_network:
    driver: bridge